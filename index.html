<!DOCTYPE html>
<html>
<head>
  <title>Simple Data Test</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    th { background: #f0f0f0; }
  </style>
</head>
<body>

  <h1>Today's Raw Data</h1>
  <table id="dataTable">
    <tr><td>Loading data from Google Sheets...</td></tr>
  </table>

  <script>
    // PASTE YOUR NEW WEB APP URL HERE
    const url = 'https://script.google.com/macros/s/AKfycbwV1kXAeMJFkK--tmNUcm6ZLAdMXf86l6c1LHNN1SGeNgC1xdcRc5cvvrvDOLXT4c6R/exec';
    
    // Cache buster ensures you get fresh data
    fetch(url + "?t=" + new Date().getTime())
      .then(response => response.json())
      .then(data => {
        const table = document.getElementById('dataTable');
        
        if (data.length <= 1) {
          table.innerHTML = "<tr><td>No data found for today's date.</td></tr>";
          return;
        }

        let html = '';
        data.forEach((row, index) => {
          // Make the header row bold
          if (index === 0) {
            html += '<tr>' + row.map(cell => '<th>' + cell + '</th>').join('') + '</tr>';
          } else {
            html += '<tr>' + row.map(cell => '<td>' + cell + '</td>').join('') + '</tr>';
          }
        });
        
        table.innerHTML = html;
      })
      .catch(error => {
        document.getElementById('dataTable').innerHTML = "<tr><td style='color:red;'>Connection Error. Check console.</td></tr>";
        console.error(error);
      });
  </script>

</body>
</html>
