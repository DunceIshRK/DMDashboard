<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DM Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --coral:     #EF6B5B;
      --coral-lt:  #F4897C;
      --coral-dim: #f0d5d1;
      --cream:     #F2EDE8;
      --cream-dk:  #E8E2DC;
      --white:     #FFFFFF;
      --ink:       #2E2A27;
      --ink-mid:   #6B6460;
      --ink-soft:  #A89E99;
      --good:      #3DBD8A;
      --bad:       #E05C5C;
      --border:    #DDD8D3;
      --shadow:    rgba(80,50,40,0.08);
      --font:      'Nunito Sans', sans-serif;
      --display:   'Nunito', sans-serif;
      --radius:    14px;
    }

    body {
      font-family: var(--font);
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    .shell {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--coral);
      display: flex;
      flex-direction: column;
      padding: 32px 20px;
      position: relative;
      overflow: hidden;
    }

    .sidebar::before,
    .sidebar::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      pointer-events: none;
    }
    .sidebar::before { width: 160px; height: 160px; top: -40px; left: -40px; }
    .sidebar::after  { width: 100px; height: 100px; bottom: 60px; right: -30px; }

    .orb-mid {
      position: absolute;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      bottom: 180px; left: -20px;
      pointer-events: none;
    }

    .brand {
      position: relative;
      z-index: 1;
      margin-bottom: 48px;
    }

    .brand-title {
      font-family: var(--display);
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      line-height: 1.15;
    }

    .brand-sub {
      font-size: 12px;
      color: rgba(255,255,255,0.60);
      margin-top: 5px;
    }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.18);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
      margin-top: 10px;
    }

    .live-dot {
      width: 6px; height: 6px;
      background: #fff;
      border-radius: 50%;
      animation: blink 2s infinite;
    }

    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      position: relative;
      z-index: 1;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-family: var(--display);
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.65);
      transition: all 0.18s;
      border: none;
      background: transparent;
      text-align: left;
      width: 100%;
    }

    .nav-item:hover { background: rgba(255,255,255,0.12); color: #fff; }

    .nav-item.active {
      background: #fff;
      color: var(--coral);
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .nav-icon { font-size: 15px; width: 20px; text-align: center; }

    /* ── MAIN ── */
    .main { display: flex; flex-direction: column; overflow-y: auto; }

    .topbar {
      padding: 28px 32px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .page-title {
      font-family: var(--display);
      font-size: 22px;
      font-weight: 800;
      color: var(--ink);
    }

    .page-sub { font-size: 13px; color: var(--ink-soft); margin-top: 3px; }

    .content { padding: 24px 32px 48px; flex: 1; }

    /* ── TABS ── */
    .tab-view { display: none; }
    .tab-view.show { display: block; animation: fadeUp 0.2s ease; }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(6px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── FORM ── */
    .form-panel {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: 0 4px 24px var(--shadow);
      overflow: hidden;
      max-width: 660px;
    }

    .form-header {
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      padding: 20px 28px;
    }

    .form-header h2 {
      font-family: var(--display);
      font-size: 17px;
      font-weight: 800;
      color: var(--ink);
    }

    .form-header p { font-size: 13px; color: var(--ink-soft); margin-top: 3px; }

    .form-body { padding: 24px 28px 8px; }

    .fg { display: grid; gap: 14px; margin-bottom: 18px; }
    .fg.c1 { grid-template-columns: 1fr; }
    .fg.c2 { grid-template-columns: 1fr 1fr; }
    .fg.c3 { grid-template-columns: 1fr 1fr 1fr; }

    .field { display: flex; flex-direction: column; gap: 5px; }

    .field label {
      font-size: 11px;
      font-weight: 700;
      color: var(--ink-mid);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .field input,
    .field select {
      background: var(--cream);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      color: var(--ink);
      font-family: var(--font);
      font-size: 14px;
      padding: 10px 13px;
      width: 100%;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--coral);
      box-shadow: 0 0 0 3px var(--coral-dim);
      background: #fff;
    }

    .field input::placeholder { color: var(--ink-soft); }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0 14px;
    }

    .divider span {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: var(--coral);
      white-space: nowrap;
    }

    .divider::before,
    .divider::after { content:''; flex:1; height:1px; background:var(--border); }

    .form-footer {
      padding: 4px 28px 24px;
      display: flex;
      justify-content: flex-end;
    }

    .btn-submit {
      background: var(--coral);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 13px 36px;
      font-family: var(--display);
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(239,107,91,0.35);
      transition: background 0.18s, transform 0.15s, box-shadow 0.18s;
    }

    .btn-submit:hover {
      background: var(--coral-lt);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(239,107,91,0.4);
    }

    .btn-submit:active { transform: translateY(0); }

    /* ── DASHBOARD ── */
    .slot-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .slot-label {
      font-family: var(--display);
      font-size: 20px;
      font-weight: 800;
      color: var(--ink);
    }

    .slot-dots { display:flex; gap:5px; align-items:center; }

    .slot-dot {
      width:7px; height:7px;
      border-radius:50%;
      background: var(--border);
      cursor:pointer;
      transition: background 0.18s, transform 0.15s;
    }

    .slot-dot.active { background: var(--coral); transform: scale(1.35); }

    .nav-arrow {
      width:34px; height:34px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--white);
      color: var(--ink-mid);
      font-size: 15px;
      cursor: pointer;
      display:flex; align-items:center; justify-content:center;
      transition: all 0.15s;
      box-shadow: 0 1px 4px var(--shadow);
    }

    .nav-arrow:hover:not(:disabled) { border-color:var(--coral); color:var(--coral); }
    .nav-arrow:disabled { opacity:0.3; cursor:not-allowed; }

    /* KPI */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px,1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .kpi-card {
      background: var(--white);
      border-radius: 12px;
      padding: 16px 18px;
      box-shadow: 0 2px 10px var(--shadow);
      border-top: 3px solid var(--coral-dim);
      transition: transform 0.15s;
    }

    .kpi-card:hover { transform: translateY(-2px); }
    .kpi-card.good-card { border-top-color: #b6edd9; }
    .kpi-card.bad-card  { border-top-color: #f5c4c4; }

    .kpi-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--ink-soft);
      margin-bottom: 7px;
    }

    .kpi-val {
      font-family: var(--display);
      font-size: 24px;
      font-weight: 800;
      color: var(--ink);
      line-height: 1;
    }

    .kpi-val.good { color: var(--good); }
    .kpi-val.bad  { color: var(--bad); }

    /* TABLE */
    .table-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: 0 2px 12px var(--shadow);
      overflow: hidden;
    }

    .table-head-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--cream-dk);
    }

    .table-head-bar h3 {
      font-family: var(--display);
      font-size: 15px;
      font-weight: 800;
      color: var(--ink);
    }

    .badge {
      background: var(--coral-dim);
      color: var(--coral);
      font-size: 11px;
      font-weight: 700;
      border-radius: 20px;
      padding: 3px 10px;
    }

    .tscroll { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--cream); }

    th {
      padding: 10px 14px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--ink-soft);
      text-align: center;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    th:first-child { text-align: left; }

    td {
      padding: 10px 14px;
      font-size: 13px;
      text-align: center;
      color: var(--ink);
      border-bottom: 1px solid var(--cream-dk);
      white-space: nowrap;
    }

    td:first-child { text-align: left; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #faf8f6; }

    .store-chip {
      display: inline-block;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-mid);
    }

    .good { color: var(--good) !important; font-weight: 700; }
    .bad  { color: var(--bad)  !important; font-weight: 700; }
    .dim  { color: var(--border) !important; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 28px; right: 28px;
      background: var(--ink);
      color: #fff;
      padding: 12px 22px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      transform: translateY(70px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999;
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
    }

    .toast.show { transform: translateY(0); opacity: 1; }

    .loading {
      display:flex; align-items:center; justify-content:center;
      padding:48px; color:var(--ink-soft); gap:10px; font-size:13px;
    }

    .spinner {
      width:16px; height:16px;
      border:2px solid var(--border);
      border-top-color:var(--coral);
      border-radius:50%;
      animation:spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform:rotate(360deg); } }

    @media (max-width: 640px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar {
        flex-direction: row;
        padding: 14px 18px;
        align-items: center;
        justify-content: space-between;
      }
      .sidebar::before,.sidebar::after,.orb-mid { display:none; }
      .brand { margin-bottom:0; }
      .brand-sub,.live-pill { display:none; }
      .brand-title { font-size:17px; line-height:1; }
      .nav { flex-direction:row; gap:4px; }
      .nav-icon { display:none; }
      .nav-item { padding:8px 14px; font-size:13px; }
      .topbar { padding:16px 16px 0; }
      .content { padding:16px; }
      .fg.c2,.fg.c3 { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="orb-mid"></div>
    <div class="brand">
      <div class="brand-title">DM<br>Dashboard</div>
      <div class="brand-sub">Operations Dashboard</div>
      <div class="live-pill"><div class="live-dot"></div> Today's</div>
    </div>
    <nav class="nav">
      <button class="nav-item active" onclick="showTab('formTab', this)">
        <span class="nav-icon">📋</span> FORM
      </button>
      <button class="nav-item" onclick="showTab('dashTab', this)">
        <span class="nav-icon">📊</span> Dashboard
      </button>
    </nav>
  </aside>

  <!-- MAIN -->
  <div class="main">
    

    <div class="content">

      <!-- FORM TAB -->
      <div id="formTab" class="tab-view show">
        <div class="form-panel">
          <div class="form-header">
            <h2>Store Metrics</h2>
            <p>Fill in the data for your store</p>
          </div>
          <form id="mainForm">
            <div class="form-body">

              <div class="fg c1">
                <div class="field">
                  <label>Store</label>
                  <select id="store" required>
                    <option value="">Select a store…</option>
                    <option>TM6N</option><option>TM4T</option><option>TM6M</option>
                    <option>T9W3</option><option>T9T3</option><option>T9V5</option>
                    <option>T3GC</option><option>TM6O</option><option>T9T7</option>
                    <option>TM4Z</option><option>TM3J</option><option>TM5C</option>
                    <option>TN1B</option><option>TK5T</option><option>TN1T</option>
                    <option>T9H8</option><option>TM8T</option><option>TN1C</option>
                    <option>TBAE</option><option>U2JH</option><option>U1WR</option>
                    <option>U949</option><option>FRVE</option><option>U286</option>
                    <option>U1WP</option><option>2314</option><option>3035</option>
                    <option>3087</option><option>F1ZP</option><option>U1L2</option>
                    <option>U14V</option><option>TNI6</option><option>U086</option>
                    <option>U1OW</option><option>TKM7</option>
                  </select>
                </div>
              </div>

              <div class="divider"><span>Orders</span></div>
              <div class="fg c3">
                <div class="field"><label>Total Orders</label><input type="number" id="total_orders" placeholder="0"></div>
                <div class="field"><label>Open Orders</label><input type="number" id="open_orders" placeholder="0"></div>
                <div class="field"><label>Cancelled</label><input type="number" id="cancelled_orders" placeholder="0"></div>
              </div>

              <div class="divider"><span>Fulfilment</span></div>
              <div class="fg c2">
                <div class="field"><label>FFO (%)</label><input type="number" id="ffo" placeholder="0.0" step="0.1"></div>
              </div>

              <div class="divider"><span>OTI — Order to Invoice</span></div>
              <div class="fg c3">
                <div class="field"><label>Hours</label><input type="number" id="oti_h" value="0" min="0"></div>
                <div class="field"><label>Minutes</label><input type="number" id="oti_m" value="0" min="0" max="59"></div>
                <div class="field"><label>Seconds</label><input type="number" id="oti_s" value="0" min="0" max="59"></div>
              </div>

              <div class="divider"><span>ITR — Invoice to Rider</span></div>
              <div class="fg c3">
                <div class="field"><label>Hours</label><input type="number" id="itr_h" value="0" min="0"></div>
                <div class="field"><label>Minutes</label><input type="number" id="itr_m" value="0" min="0" max="59"></div>
                <div class="field"><label>Seconds</label><input type="number" id="itr_s" value="0" min="0" max="59"></div>
              </div>

              <div class="divider"><span>OTD — Order to Delivery</span></div>
              <div class="fg c3">
                <div class="field"><label>Hours</label><input type="number" id="otd_h" value="0" min="0"></div>
                <div class="field"><label>Minutes</label><input type="number" id="otd_m" value="0" min="0" max="59"></div>
                <div class="field"><label>Seconds</label><input type="number" id="otd_s" value="0" min="0" max="59"></div>
              </div>

            </div>
            <div class="form-footer">
              <button type="submit" class="btn-submit">Submit Report →</button>
            </div>
          </form>
        </div>
      </div>

      <!-- DASHBOARD TAB -->
      <div id="dashTab" class="tab-view">

        <div class="slot-bar">
          <button class="nav-arrow" id="prevBtn" onclick="prevSlot()">←</button>
          <span class="slot-label" id="slotLabel">—</span>
          <div class="slot-dots" id="slotDots"></div>
          <button class="nav-arrow" id="nextBtn" onclick="nextSlot()">→</button>
        </div>

        <div class="kpi-row" id="kpiContainer">
          <div class="loading"><div class="spinner"></div> Loading…</div>
        </div>

        <div class="table-card">
          <div class="table-head-bar">
            <h3>Store Breakdown</h3>
            <span class="badge" id="tableCount">Performance</span>
          </div>
          <div class="tscroll">
            <table>
              <thead>
                <tr>
                  <th>Store</th><th>Total</th><th>Open</th><th>Cancel</th>
                  <th>FFO %</th><th>OTI</th><th>ITR</th><th>OTD</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr><td colspan="8"><div class="loading"><div class="spinner"></div> Loading…</div></td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>

    </div>
  </div>
</div>

<div class="toast" id="toast">✓ Report submitted</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyG9EJNzonUT15CrbhPtCZuYPdR0e86sVQa6fi82JjN6oBbDW56IVR5TlmjIq7NKJm8/exec";
let allData = [];
const stores = [
  "TM6N","TM4T","TM6M","T9W3","T9T3","T9V5","T3GC","TM6O","T9T7",
  "TM4Z","TM3J","TM5C","TN1B","TK5T","TN1T","T9H8","TM8T","TN1C",
  "TBAE","U2JH","U1WR","U949","FRVE","U286","U1WP","2314","3035",
  "3087","F1ZP","U1L2","U14V","TNI6","U086","U1OW","TKM7"
];
const slots = [[8,10],[10,12],[12,14],[14,16],[16,18],[18,20],[20,22]];
let idx = 0;

function setCurrentSlot() {
  const h = new Date().getHours();
  for (let i = 0; i < slots.length; i++) {
    if (h >= slots[i][0] && h < slots[i][1]) { idx = i; return; }
  }
  idx = 0;
}

function showTab(tab, btn) {
  document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('show'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById(tab).classList.add('show');
  btn.classList.add('active');
  const map = {
    formTab: ['Submit Report', 'Enter store metrics for the current slot'],
    dashTab: ['Dashboard', 'Live view across all stores']
  };
  document.getElementById('pageTitle').textContent = map[tab][0];
  document.getElementById('pageSub').textContent   = map[tab][1];
  if (tab === 'dashTab') { setCurrentSlot(); allData = []; loadData(); }
}

function buildDots() {
  document.getElementById('slotDots').innerHTML = slots.map((_,i) =>
    `<div class="slot-dot ${i===idx?'active':''}" onclick="goSlot(${i})"></div>`
  ).join('');
}

function goSlot(i)  { idx=i; renderDash(); }
function prevSlot() { if(idx>0){ idx--; renderDash(); } }
function nextSlot() { if(idx<slots.length-1){ idx++; renderDash(); } }

function sec(h,m,s) { return +h*3600 + +m*60 + +s; }
function fmt(s) { if(!s) return '—'; return Math.floor(s/60)+'m'; }

function statusCls(v, type) {
  if(!v) return '';
  if(type==='ffo') return v>95  ? 'good':'bad';
  if(type==='oti') return v<120 ? 'good':'bad';
  if(type==='itr') return v<60  ? 'good':'bad';
  if(type==='otd') return v<900 ? 'good':'bad';
  return '';
}

document.getElementById('mainForm').addEventListener('submit', async e => {
  e.preventDefault();
  const g = id => document.getElementById(id);
  const data = {
    store:            g('store').value,
    total_orders:     +g('total_orders').value     || null,
    open_orders:      +g('open_orders').value      || null,
    cancelled_orders: +g('cancelled_orders').value || null,
    ffo:              +g('ffo').value              || null,
    oti: sec(g('oti_h').value, g('oti_m').value, g('oti_s').value),
    itr: sec(g('itr_h').value, g('itr_m').value, g('itr_s').value),
    otd: sec(g('otd_h').value, g('otd_m').value, g('otd_s').value),
  };
  await fetch(API, { method:'POST', body:JSON.stringify(data) });
  g('mainForm').reset();
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
});

let fetching = false;
async function loadData() {
  if(fetching) return;
  fetching = true;
  try {
    const text = await (await fetch(API)).text();
    allData = JSON.parse(text);
  } catch(err) { console.error(err); }
  fetching = false;
  renderDash();
}

function renderDash() {
  if(!allData.length) return;
  const [s,e] = slots[idx];
  document.getElementById('slotLabel').textContent = `${s}:00 – ${e}:00`;
  document.getElementById('prevBtn').disabled = idx===0;
  document.getElementById('nextBtn').disabled = idx===slots.length-1;
  buildDots();

  const map = {};
  allData.forEach(d => {
    const h = new Date(d.timestamp.replace(' ','T')).getHours();
    if(h>=s && h<e) {
      if(!map[d.store]) map[d.store]={};
      Object.keys(d).forEach(k => {
        if(map[d.store][k]==null && d[k]!=null) map[d.store][k]=d[k];
      });
    }
  });

  let tot=0,open=0,cancel=0;
  let fS=0,fC=0,oS=0,oC=0,iS=0,iC=0,dS=0,dC=0;
  Object.values(map).forEach(i => {
    if(i.total_orders)     tot    +=i.total_orders;
    if(i.open_orders)      open   +=i.open_orders;
    if(i.cancelled_orders) cancel +=i.cancelled_orders;
    if(i.ffo){fS+=i.ffo;fC++;}
    if(i.oti){oS+=i.oti;oC++;}
    if(i.itr){iS+=i.itr;iC++;}
    if(i.otd){dS+=i.otd;dC++;}
  });

  const aFfo=fC?fS/fC:null, aOti=oC?oS/oC:null, aItr=iC?iS/iC:null, aOtd=dC?dS/dC:null;

  const kpis = [
    {label:'Total Orders', val:tot||'—',  raw:null,  type:null},
    {label:'Open Orders',  val:open||'—', raw:null,  type:null},
    {label:'Cancelled',    val:cancel||'—',raw:null, type:null},
    {label:'Avg FFO',  val:aFfo?aFfo.toFixed(1)+'%':'—', raw:aFfo, type:'ffo'},
    {label:'Avg OTI',  val:aOti?fmt(aOti):'—', raw:aOti, type:'oti'},
    {label:'Avg ITR',  val:aItr?fmt(aItr):'—', raw:aItr, type:'itr'},
    {label:'Avg OTD',  val:aOtd?fmt(aOtd):'—', raw:aOtd, type:'otd'},
  ];

  document.getElementById('kpiContainer').innerHTML = kpis.map(k => {
    const cls = k.type ? statusCls(k.raw, k.type) : '';
    return `<div class="kpi-card ${cls?cls+'-card':''}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-val ${cls}">${k.val}</div>
    </div>`;
  }).join('');

  document.getElementById('tableBody').innerHTML = stores.map(store => {
    const i = map[store]||{};
    const cell = (v, type) => {
      if(v==null) return `<span class="dim">—</span>`;
      const cls = type ? statusCls(v,type) : '';
      const disp = type==='ffo' ? v+'%' : (['oti','itr','otd'].includes(type) ? fmt(v) : v);
      return cls ? `<span class="${cls}">${disp}</span>` : disp;
    };
    return `<tr>
      <td><span class="store-chip">${store}</span></td>
      <td>${i.total_orders!=null?i.total_orders:'<span class="dim">—</span>'}</td>
      <td>${i.open_orders!=null?i.open_orders:'<span class="dim">—</span>'}</td>
      <td>${i.cancelled_orders!=null?i.cancelled_orders:'<span class="dim">—</span>'}</td>
      <td>${cell(i.ffo,'ffo')}</td>
      <td>${cell(i.oti,'oti')}</td>
      <td>${cell(i.itr,'itr')}</td>
      <td>${cell(i.otd,'otd')}</td>
    </tr>`;
  }).join('');
}

setCurrentSlot();

setInterval(async () => {
  if(!document.getElementById('dashTab').classList.contains('show')) return;
  try { allData=await(await fetch(API)).json(); setCurrentSlot(); renderDash(); } catch(e){}
}, 30000);
</script>
</body>
